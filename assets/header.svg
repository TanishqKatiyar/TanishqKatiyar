    @keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}
    @keyframes shimmer{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
    .p1{animation:pulse 3s ease-in-out infinite}
    .p2{animation:pulse 4s ease-in-out infinite}
    .p3{animation:pulse 3.5s ease-in-out infinite}
    .sh{animation:shimmer 6s ease-in-out infinite}
  </style>
  <defs>
